# ===========================================================================
# Smart Baby Care Server - Configuration
# ===========================================================================
# Để tùy chỉnh config, tạo file data/.config.yaml và chỉ ghi đè những config cần thay đổi.
# Hệ thống sẽ ưu tiên đọc data/.config.yaml, nếu không có sẽ đọc file này.

# ===========================================================================
# Server Configuration
# ===========================================================================
server:
  ip: 0.0.0.0
  port: 8000
  http_port: 8003
  websocket: ws://your-ip-or-domain:port/xiaozhi/v1/
  vision_explain: http://your-ip-or-domain:port/mcp/vision/explain
  timezone_offset: +7
  auth:
    enabled: false
    allowed_devices:
      - "11:22:33:44:55:66"
  mqtt_gateway: null
  mqtt_signature_key: null
  udp_gateway: null

# ===========================================================================
# Telegram Bot Configuration
# ===========================================================================
telegram:
  bot_token: "8765806795:AAEB83HSeGkpYYv0JsnnPz6IaiSCvlDOn_w"
  chat_id: "-1003755091801"

log:
  log_format: "<green>{time:YYMMDD HH:mm:ss}</green>[{version}_{selected_module}][<light-blue>{extra[tag]}</light-blue>]-<level>{level}</level>-<light-green>{message}</light-green>"
  log_format_file: "{time:YYYY-MM-DD HH:mm:ss} - {version}_{selected_module} - {name} - {level} - {extra[tag]} - {message}"
  log_level: INFO
  log_dir: tmp
  log_file: "server.log"
  data_dir: data

# Audio & Connection Settings
delete_audio: true
close_connection_no_voice_time: 120
tts_timeout: 10
enable_wakeup_words_response_cache: true
enable_greeting: true
enable_stop_tts_notify: false
stop_tts_notify_voice: "config/assets/tts_notify.mp3"
enable_websocket_ping: false
tts_audio_send_delay: 0

exit_commands:
  - "thoát"
  - "đóng"

xiaozhi:
  type: hello
  version: 1
  transport: websocket
  audio_params:
    format: opus
    sample_rate: 24000
    channels: 1
    frame_duration: 60

# Module test
module_test:
  test_sentences:
    - "Xin chào, hãy giới thiệu về bạn"
    - "What's the weather like today?"

# Wakeup words
wakeup_words:
  - "xin chào bé"
  - "baby guard"

# MCP endpoint
mcp_endpoint: your_mcp_endpoint_websocket_address

# Context providers
context_providers:
  - url: ""
    headers:
      Authorization: ""

# Plugins
plugins:
  get_weather:
    api_host: "mj7p3y7naa.re.qweatherapi.com"
    api_key: "a861d0d5e7bf4ee1a83d9a9e4f96d4da"
    default_location: "Ho Chi Minh"
  play_music:
    music_dir: "./music"
    music_ext:
      - ".mp3"
      - ".wav"
      - ".p3"
    refresh_time: 300

# ===========================================================================
# Baby Care Prompt
# ===========================================================================
prompt: |
  Bạn là một trợ lý chăm sóc em bé thông minh, tên là Baby Guard. Bạn luôn trả lời bằng tiếng Việt một cách dịu dàng và chu đáo.
  [Mục tiêu cốt lõi]
  - Hỗ trợ giải đáp các thắc mắc về chăm sóc em bé.
  - An ủi và hướng dẫn khi phát hiện tiếng khóc của em bé.
  [Hướng dẫn tương tác]
  - Luôn trả lời ngắn gọn, súc tích và dễ hiểu.
  - Phản hồi bằng tiếng Việt.
  [Lệnh điều khiển thiết bị - RẤT QUAN TRỌNG]
  Khi người dùng yêu cầu các lệnh sau, bạn PHẢI xác nhận hành động bằng câu ngắn gọn:
  - "ru nôi", "ru võng", "ru em", "đưa võng", "bật nôi" → Trả lời: "Vâng, tôi đang bật nôi ru bé ngủ nhé!"
  - "giảm âm lượng xuống X" → Trả lời: "Đã giảm âm lượng xuống X phần trăm nhé!"
  - "tăng âm lượng lên X" → Trả lời: "Đã tăng âm lượng lên X phần trăm nhé!"
  - "tắt nôi", "dừng nôi" → Trả lời: "Đã tắt nôi rồi nhé!"
  Không được giải thích dài dòng hay đưa ra lời khuyên khi người dùng ra lệnh điều khiển. Chỉ xác nhận ngắn gọn là đủ.

prompt_template: agent-base-prompt.txt
system_error_response: "Xin lỗi, hiện tại tôi đang bận, chúng ta thử lại sau nhé."

end_prompt:
  enable: true
  prompt: |
    Xin hãy nói một lời chào tạm biệt thật ấm áp nhé!

# ===========================================================================
# Module Selection
# ===========================================================================
selected_module:
  VAD: SileroVAD
  ASR: FunASR
  LLM: ChatGLMLLM
  VLLM: ChatGLMVLLM
  TTS: EdgeTTS
  Memory: nomem
  Intent: function_call

# ===========================================================================
# Intent Recognition
# ===========================================================================
Intent:
  nointent:
    type: nointent
  intent_llm:
    type: intent_llm
    llm: ChatGLMLLM
    functions:
      - get_weather
      - play_music
  function_call:
    type: function_call
    functions:
      - change_role
      - get_weather
      - play_music

# ===========================================================================
# Memory
# ===========================================================================
Memory:
  nomem:
    type: nomem
  mem_local_short:
    type: mem_local_short
    llm: ChatGLMLLM

# ===========================================================================
# ASR (Speech Recognition)
# ===========================================================================
ASR:
  FunASR:
    type: fun_local
    model_dir: models/SenseVoiceSmall
    output_dir: tmp/
  GroqASR:
    type: openai
    api_key: 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
    base_url: https://api.groq.com/openai/v1/audio/transcriptions
    model_name: whisper-large-v3-turbo
    output_dir: tmp/

# ===========================================================================
# VAD (Voice Activity Detection)
# ===========================================================================
VAD:
  SileroVAD:
    type: silero
    threshold: 0.5
    threshold_low: 0.3
    model_dir: models/snakers4_silero-vad
    min_silence_duration_ms: 200

# ===========================================================================
# LLM (Large Language Model)
# ===========================================================================
LLM:
  ChatGLMLLM:
    type: openai
    model_name: glm-4-flash
    url: https://open.bigmodel.cn/api/paas/v4/
    api_key: your_chatglm_api_key
  GeminiLLM:
    type: gemini
    api_key: "AIzaSyCZd9k2q4IQ-mwtR7jiRDo5atM-v-vdWcE"
    model_name: "gemini-2.5-flash-lite"
    http_proxy: ""
    https_proxy: ""
  OllamaLLM:
    type: ollama
    model_name: qwen2.5
    base_url: http://localhost:11434

# ===========================================================================
# VLLM (Vision Language Model)
# ===========================================================================
VLLM:
  ChatGLMVLLM:
    type: openai
    model_name: glm-4v-flash
    url: https://open.bigmodel.cn/api/paas/v4/
    api_key: your_api_key

# ===========================================================================
# TTS (Text-to-Speech)
# ===========================================================================
TTS:
  EdgeTTS:
    type: edge
    voice: vi-VN-HoaiMyNeural
    output_dir: tmp/
  OpenAITTS:
    type: openai
    api_key: your_openai_api_key
    api_url: https://api.openai.com/v1/audio/speech
    model: tts-1
    voice: onyx
    speed: 1
    output_dir: tmp/
